name: Tests (macOS arm)

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "doc*/**"
      - "./*.ya?ml"
      - "**/*.md"
      - "**/*.rst"

  pull_request:
    paths-ignore:
      - "doc*/**"
      - "./*.ya?ml"
      - "**/*.md"
      - "**/*.rst"

  workflow_dispatch:

jobs:
  main:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        # only test newest version of torch
        torch-version: ["2.10.0"]

    permissions:
      contents: read

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash {0}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install tox

      - name: Determine TOXENV
        run: echo "TOXENV=py$(echo ${{ matrix.python-version }} | tr -d '.')-torch$(echo ${{ matrix.torch-version }} | tr -d '.')-nolibcint" >> $GITHUB_ENV

      - name: Print TOXENV
        run: echo "TOXENV is set to '${TOXENV}'."
        env:
          TOXENV: ${{ env.TOXENV }}

      - name: Unittests with tox
        run: EXTRAS=pyscf tox -e $TOXENV
        env:
          TOXENV: ${{ env.TOXENV }}
